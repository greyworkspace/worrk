<!DOCTYPE html>
<html>
<head>
  <title>Plane</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/MTLLoader.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

let airplane;

const mtlLoader = new THREE.MTLLoader();
mtlLoader.setPath('./'); // IMPORTANT

mtlLoader.load('11803_Airplane_v1_l1.mtl', function(materials) {
  materials.preload();

  const objLoader = new THREE.OBJLoader();
  objLoader.setMaterials(materials);
  objLoader.setPath('./'); // IMPORTANT

  objLoader.load('11803_Airplane_v1_l1.obj',
    function(object) {
      airplane = object;
      airplane.scale.set(0.4,0.4,0.4);
      scene.add(airplane);
    },
    undefined,
    function(err){ console.error("OBJ load error:", err); }
  );
},
undefined,
function(err){ console.error("MTL load error:", err); }
);

let t = 0;

function animate() {
  requestAnimationFrame(animate);

  if (airplane) {
    t += 0.02;

    airplane.position.x = Math.sin(t)*3;
    airplane.position.z = Math.cos(t)*3;
    airplane.position.y = Math.sin(t*2);

    airplane.rotation.y = t;
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
